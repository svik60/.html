<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Arcade Chaos Soccer</title>
<style>
  body { margin:0; background:#000; display:flex; justify-content:center; align-items:center; height:100vh; }
  canvas { border:4px solid #fff; background:#0a4; image-rendering:pixelated; }
  #hud { position:absolute; top:10px; left:10px; color:white; font-family:monospace; }
</style>
</head>
<body>
<div id="hud">ARCADE CHAOS SOCCER — Arrows move, Z dash, X kick</div>
<canvas id="c" width="640" height="360"></canvas>

<script>
const c = document.getElementById("c");
const ctx = c.getContext("2d");

// Player, AI, Keeper, Ball
const player = { x:120, y:180, speed:2.4, dash:4.2 };
const ai = { x:520, y:180, speed:2.8 };
const keeper = { x:600, y:180, w:12, h:30, speed:2 };

const ball = { x:320, y:180, r:6, vx:0, vy:0, friction:0.985, max:9 };

// Goals
const goalLeft = { x: 10, y: 120, w: 4, h: 120 };
const goalRight = { x: 626, y: 120, w: 4, h: 120 };

let score = 0;
let keys = {};
let anim = 0;

document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

function clamp(v,min,max){ return Math.max(min,Math.min(max,v)); }

// PLAYER MOVEMENT
function movePlayer(){
  let sp = keys["z"]||keys["Z"] ? player.dash : player.speed;
  let dx=0, dy=0;
  if(keys["ArrowUp"]) dy -= 1;
  if(keys["ArrowDown"]) dy += 1;
  if(keys["ArrowLeft"]) dx -= 1;
  if(keys["ArrowRight"]) dx += 1;
  if(dx||dy){
    let l = Math.hypot(dx,dy);
    dx/=l; dy/=l;
    player.x += dx*sp;
    player.y += dy*sp;
  }
  player.x = clamp(player.x,20,620);
  player.y = clamp(player.y,20,340);
}

// AI MOVEMENT
function moveAI(){
  let futureX = ball.x + ball.vx*10;
  let futureY = ball.y + ball.vy*10;

  let dx = futureX - ai.x + (Math.random()*40 - 20);
  let dy = futureY - ai.y + (Math.random()*40 - 20);

  let l = Math.hypot(dx,dy);
  if(l>1){
    ai.x += (dx/l)*ai.speed;
    ai.y += (dy/l)*ai.speed;
  }

  ai.x = clamp(ai.x,340,620);
  ai.y = clamp(ai.y,20,340);
}

// KEEPER MOVEMENT
function moveKeeper(){
  let dy = ball.y - keeper.y;
  if(Math.abs(dy) > 2){
    keeper.y += Math.sign(dy) * keeper.speed;
  }
  keeper.y = clamp(keeper.y, 40, 320);
}

// BALL PHYSICS
function ballPhysics(){
  ball.x += ball.vx;
  ball.y += ball.vy;

  ball.vx *= ball.friction;
  ball.vy *= ball.friction;

  let sp = Math.hypot(ball.vx,ball.vy);
  if(sp > ball.max){
    ball.vx = ball.vx/sp * ball.max;
    ball.vy = ball.vy/sp * ball.max;
  }

  if(ball.x-ball.r<10 || ball.x+ball.r>630) ball.vx *= -1.1;
  if(ball.y-ball.r<10 || ball.y+ball.r>350) ball.vy *= -1.1;

  ball.x = clamp(ball.x,10+ball.r,630-ball.r);
  ball.y = clamp(ball.y,10+ball.r,350-ball.r);
}

// COLLISIONS
function collidePlayer(){
  let d = Math.hypot(ball.x-player.x, ball.y-player.y);
  if(d < 20){
    let ang = Math.atan2(ball.y-player.y, ball.x-player.x);
    ball.x = player.x + Math.cos(ang)*20;
    ball.y = player.y + Math.sin(ang)*20;

    if(keys["x"]||keys["X"]){
      let kick = keys["z"]||keys["Z"] ? 10 : 6;
      ball.vx = Math.cos(ang)*kick;
      ball.vy = Math.sin(ang)*kick;
    }
  }
}

function collideAI(){
  let d = Math.hypot(ball.x-ai.x, ball.y-ai.y);
  if(d < 20){
    let ang = Math.atan2(ball.y-ai.y, ball.x-ai.x);
    ball.vx = Math.cos(ang)*8;
    ball.vy = Math.sin(ang)*8;
  }
}

function collideKeeper(){
  let d = Math.hypot(ball.x-keeper.x, ball.y-keeper.y);
  if(d < 22){
    let ang = Math.atan2(ball.y-keeper.y, ball.x-keeper.x);
    ball.vx = Math.cos(ang) * -10;
    ball.vy = Math.sin(ang) * -10;
  }
}

// GOAL CHECK
function checkGoal(){
  // Player scores (right goal)
  if(ball.x+ball.r >= goalRight.x && ball.y >= goalRight.y && ball.y <= goalRight.y+goalRight.h){
    score++;
    reset();
  }

  // AI scores (left goal)
  if(ball.x-ball.r <= goalLeft.x+goalLeft.w && ball.y >= goalLeft.y && ball.y <= goalLeft.y+goalLeft.h){
    score--;
    reset();
  }
}

// RESET
function reset(){
  player.x=120; player.y=180;
  ai.x=520; ai.y=180;
  keeper.x=600; keeper.y=180;
  ball.x=320; ball.y=180;
  ball.vx=0; ball.vy=0;
}

// DRAW PLAYER
function drawPlayer(){
  ctx.fillStyle = "#ff0";
  ctx.fillRect(player.x-6, player.y-10, 12, 18);

  ctx.fillStyle = "#ffe0b3";
  ctx.beginPath();
  ctx.arc(player.x, player.y-16, 6, 0, Math.PI*2);
  ctx.fill();

  let legOffset = Math.sin(anim) * 2;
  ctx.fillStyle = "#000";
  ctx.fillRect(player.x-6, player.y+8 + legOffset, 5, 10);
  ctx.fillRect(player.x+1, player.y+8 - legOffset, 5, 10);
}

// DRAW AI
function drawAI(){
  ctx.fillStyle = "#f44";
  ctx.fillRect(ai.x-6, ai.y-10, 12, 18);

  ctx.fillStyle = "#ccc";
  ctx.beginPath();
  ctx.arc(ai.x, ai.y-16, 6, 0, Math.PI*2);
  ctx.fill();

  ctx.fillStyle = "#00f";
  ctx.fillRect(ai.x-4, ai.y-18, 3, 3);
  ctx.fillRect(ai.x+1, ai.y-18, 3, 3);

  let legOffsetAI = Math.sin(anim*1.3) * 2;
  ctx.fillStyle = "#000";
  ctx.fillRect(ai.x-6, ai.y+8 + legOffsetAI, 5, 10);
  ctx.fillRect(ai.x+1, ai.y+8 - legOffsetAI, 5, 10);
}

// DRAW KEEPER
function drawKeeper(){
  ctx.fillStyle="#0ff";
  ctx.fillRect(keeper.x-keeper.w/2, keeper.y-keeper.h/2, keeper.w, keeper.h);
}

// DRAW EVERYTHING
function draw(){
  ctx.fillStyle="#0a4";
  ctx.fillRect(0,0,640,360);

  ctx.strokeStyle="#fff";
  ctx.lineWidth=2;
  ctx.strokeRect(10,10,620,340);

  ctx.beginPath();
  ctx.setLineDash([6,6]);
  ctx.moveTo(320,10);
  ctx.lineTo(320,350);
  ctx.stroke();
  ctx.setLineDash([]);

  // Goals
  ctx.fillStyle="#fff";
  ctx.fillRect(goalLeft.x, goalLeft.y, goalLeft.w, goalLeft.h);
  ctx.fillRect(goalRight.x, goalRight.y, goalRight.w, goalRight.h);

  drawPlayer();
  drawAI();
  drawKeeper();

  ctx.fillStyle="#fff";
  ctx.beginPath();
  ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2);
  ctx.fill();

  ctx.fillStyle="#fff";
  ctx.font="18px monospace";
  ctx.fillText("Score: "+score, 20, 30);
}

// MAIN LOOP
function loop(){
  anim += 0.15;
  movePlayer();
  moveAI();
  moveKeeper();
  ballPhysics();
  collidePlayer();
  collideAI();
  collideKeeper();
  checkGoal();
  draw();
  requestAnimationFrame(loop);
}

reset();
loop();
</script>
</body>
</html>
