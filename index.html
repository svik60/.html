<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Arcade Chaos Soccer</title>
<style>
  body { margin:0; background:#000; display:flex; justify-content:center; align-items:center; height:100vh; }
  canvas { border:4px solid #fff; background:#0a4; image-rendering:pixelated; }
  #hud { position:absolute; top:10px; left:10px; color:white; font-family:monospace; }
</style>
</head>
<body>
<div id="hud">ARCADE CHAOS SOCCER — Arrows move, Z dash, X kick</div>
<canvas id="c" width="640" height="360"></canvas>
<script>
const c = document.getElementById("c");
const ctx = c.getContext("2d");

const player = { x:120, y:180, w:14, h:14, speed:2.4, dash:4.2 };
const ai = { x:520, y:180, w:14, h:14, speed:2.8 };
const ball = { x:320, y:180, r:6, vx:0, vy:0, friction:0.985, max:9 };

let score = 0;
let keys = {};

document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

function clamp(v,min,max){ return Math.max(min,Math.min(max,v)); }

function movePlayer(){
  let sp = keys["z"]||keys["Z"] ? player.dash : player.speed;
  let dx=0, dy=0;
  if(keys["ArrowUp"]) dy -= 1;
  if(keys["ArrowDown"]) dy += 1;
  if(keys["ArrowLeft"]) dx -= 1;
  if(keys["ArrowRight"]) dx += 1;
  if(dx||dy){
    let l = Math.hypot(dx,dy);
    dx/=l; dy/=l;
    player.x += dx*sp;
    player.y += dy*sp;
  }
  player.x = clamp(player.x,20,620);
  player.y = clamp(player.y,20,340);
}

function moveAI(){
  // AI is intentionally chaotic
  let tx = ball.x + (Math.random()*40 - 20);
  let ty = ball.y + (Math.random()*40 - 20);
  let dx = tx - ai.x;
  let dy = ty - ai.y;
  let l = Math.hypot(dx,dy);
  if(l>1){
    ai.x += (dx/l)*ai.speed;
    ai.y += (dy/l)*ai.speed;
  }
  ai.x = clamp(ai.x,340,620);
  ai.y = clamp(ai.y,20,340);
}

function ballPhysics(){
  ball.x += ball.vx;
  ball.y += ball.vy;

  ball.vx *= ball.friction;
  ball.vy *= ball.friction;

  let sp = Math.hypot(ball.vx,ball.vy);
  if(sp > ball.max){
    ball.vx = ball.vx/sp * ball.max;
    ball.vy = ball.vy/sp * ball.max;
  }

  if(ball.x-ball.r<10 || ball.x+ball.r>630) ball.vx *= -1.1;
  if(ball.y-ball.r<10 || ball.y+ball.r>350) ball.vy *= -1.1;

  ball.x = clamp(ball.x,10+ball.r,630-ball.r);
  ball.y = clamp(ball.y,10+ball.r,350-ball.r);
}

function collidePlayer(){
  let d = Math.hypot(ball.x-player.x, ball.y-player.y);
  if(d < 20){
    let ang = Math.atan2(ball.y-player.y, ball.x-player.x);
    ball.x = player.x + Math.cos(ang)*20;
    ball.y = player.y + Math.sin(ang)*20;

    if(keys["x"]||keys["X"]){
      let kick = keys["z"]||keys["Z"] ? 10 : 6;
      ball.vx = Math.cos(ang)*kick;
      ball.vy = Math.sin(ang)*kick;
    }
  }
}

function collideAI(){
  let d = Math.hypot(ball.x-ai.x, ball.y-ai.y);
  if(d < 20){
    let ang = Math.atan2(ball.y-ai.y, ball.x-ai.x);
    ball.vx = Math.cos(ang)*8;
    ball.vy = Math.sin(ang)*8;
  }
}

function checkGoal(){
  let goalLeft = 620;
  let top = 120, bottom = 240;
  if(ball.x+ball.r >= goalLeft && ball.y>=top && ball.y<=bottom){
    score++;
    reset();
  }
}

function reset(){
  player.x=120; player.y=180;
  ai.x=520; ai.y=180;
  ball.x=320; ball.y=180;
  ball.vx=0; ball.vy=0;
}

function draw(){
  ctx.fillStyle="#0a4";
  ctx.fillRect(0,0,640,360);

  ctx.strokeStyle="#fff";
  ctx.lineWidth=2;
  ctx.strokeRect(10,10,620,340);

  ctx.beginPath();
  ctx.setLineDash([6,6]);
  ctx.moveTo(320,10);
  ctx.lineTo(320,350);
  ctx.stroke();
  ctx.setLineDash([]);

  ctx.fillStyle="#fff";
  ctx.fillRect(620,120,4,120);

  ctx.fillStyle="#ff0";
  ctx.fillRect(player.x-player.w/2, player.y-player.h/2, player.w, player.h);

  ctx.fillStyle="#f44";
  ctx.fillRect(ai.x-ai.w/2, ai.y-ai.h/2, ai.w, ai.h);

  ctx.fillStyle="#fff";
  ctx.beginPath();
  ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2);
  ctx.fill();

  ctx.fillStyle="#fff";
  ctx.font="18px monospace";
  ctx.fillText("Score: "+score, 20, 30);
}

function loop(){
  movePlayer();
  moveAI();
  ballPhysics();
  collidePlayer();
  collideAI();
  checkGoal();
  draw();
  requestAnimationFrame(loop);
}

reset();
loop();
</script>
</body>
</html>
